<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtoZ Bombay - Player Login</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-app.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-auth.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-database.min.js"></script>

    <script src="firebase-config.js"></script>
    <link rel="stylesheet" href="style.css">
    
    <style>
        .login-viewport-v56 { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0f172a; font-family: sans-serif; }
        .login-card-v56 { background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 0 20px rgba(0,255,200,0.2); width: 100%; max-width: 400px; border: 1px solid #334155; text-align: center; }
        .login-card-v56 h2 { color: #00ffc8; margin-bottom: 20px; font-size: 24px; text-transform: uppercase; }
        .input-group-v56 { margin-bottom: 15px; text-align: left; }
        .input-group-v56 label { display: block; color: #94a3b8; margin-bottom: 5px; font-size: 14px; }
        .input-group-v56 input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: #fff; font-size: 16px; box-sizing: border-box; }
        .btn-login-v56 { width: 100%; padding: 12px; background: #00ffc8; border: none; border-radius: 6px; color: #0f172a; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .error-message { color: #ef4444; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body class="login-viewport-v56">

    <div class="login-card-v56">
        <h2>ATOZ BOMBAY LOGIN</h2>
        <form id="playerLoginForm">
            <div class="input-group-v56">
                <label for="playerId">প্লেয়ার আইডি (Player ID):</label>
                <input type="text" id="playerId" required placeholder="ID লিখুন">
            </div>
            <div class="input-group-v56">
                <label for="playerPin">পিন কোড (PIN Code):</label>
                <input type="password" id="playerPin" required placeholder="4 ডিজিট পিন">
            </div>
            <button type="submit" class="btn-login-v56">লগইন করুন</button>
            <div id="loginError" class="error-message">ভুল আইডি অথবা পিন!</div>
        </form>
    </div>

    <script>
        document.getElementById('playerLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('playerId').value.trim();
            const pin = document.getElementById('playerPin').value.trim();
            const errorDiv = document.getElementById('loginError');

            if (!window.db) {
                alert("ফায়ারবেস কানেক্ট হচ্ছে, অনুগ্রহ করে ১ সেকেন্ড অপেক্ষা করুন!");
                return;
            }

            window.db.ref('players/' + id).once('value').then((snapshot) => {
                const playerData = snapshot.val();
                if (playerData && playerData.pin === pin && playerData.status === 'active') {
                    localStorage.setItem("loggedInUser", JSON.stringify({ id: id, name: playerData.name }));
                    firebase.auth().signInAnonymously().then(() => {
                        window.location.href = "dashboard.html"; // সোজা ড্যাশবোর্ডে চালান
                    });
                } else {
                    errorDiv.style.display = 'block';
                }
            }).catch((err) => {
                console.error(err);
                errorDiv.style.display = 'block';
            });
        });
    </script>
</body>
</html>
