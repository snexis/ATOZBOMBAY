<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtoZ Bombay - Premium Player Portal</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-app.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-auth.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-database.min.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { margin: 0; background: #0f172a; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { background: #1e293b; padding: 30px; border-radius: 12px; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #00ffc8; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>ATOZ BOMBAY LOGIN</h2>
        <form id="playerLoginForm">
            <input type="text" id="playerId" placeholder="Player ID" required>
            <input type="password" id="playerPin" placeholder="PIN Code" required>
            <button type="submit">লগইন করুন</button>
        </form>
        <div id="loginError" style="color:red; margin-top:10px; display:none;"></div>
    </div>

    <script>
        document.getElementById('playerLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('playerId').value.trim();
            const pin = document.getElementById('playerPin').value.trim();
            const errorDiv = document.getElementById('loginError');

            firebase.auth().signInAnonymously().then(() => {
                // ১. প্রথমে রুট পাথে চেক করবে
                firebase.database().ref(id).once('value').then((snapshot) => {
                    let playerData = snapshot.val();
                    let dbPath = id;

                    if (!playerData) {
                        // ২. যদি রুটে না পায়, তবে 'users/' পাথে চেক করবে
                        firebase.database().ref('users/' + id).once('value').then((userSnapshot) => {
                            playerData = userSnapshot.val();
                            dbPath = 'users/' + id;
                            handleLogin(playerData, dbPath, id, pin);
                        });
                    } else {
                        handleLogin(playerData, dbPath, id, pin);
                    }
                });
            }).catch(err => {
                errorDiv.style.display = 'block';
                errorDiv.innerText = "কানেকশন এরর!";
            });
        });

        function handleLogin(data, path, id, pin) {
            if (data && (data.password == pin || data.pin == pin)) {
                window.location.href = "dashboard.html";
            } else {
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('loginError').innerText = "ভুল আইডি বা পিন!";
                firebase.auth().signOut();
            }
        }
    </script>
</body>
</html>
