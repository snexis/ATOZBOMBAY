<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-TO-Z Bombay | Player Login</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="login-container">
        <h2>Player Zone</h2>
        <form id="playerLoginForm">
            <div class="input-group">
                <!-- এখানে লেবেল বদলে শুধু Player ID করে দেওয়া হয়েছে -->
                <label for="playerEmail">Player ID</label>
                <!-- type="text" করা হয়েছে যাতে @ বা মেইল আইডি না লিখতে হয় -->
                <input type="text" id="playerEmail" required placeholder="Enter your unique ID (e.g., a01)">
            </div>
            
            <div class="input-group">
                <label for="playerPassword">Password</label>
                <input type="password" id="playerPassword" required placeholder="Enter password">
            </div>
            
            <button type="submit" class="btn">Enter Game</button>
        </form>
    </div>

    <script type="module">
        import { handlePlayerLogin } from "./auth.js";

        document.getElementById('playerLoginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const inputId = document.getElementById('playerEmail').value.trim();
            const pass = document.getElementById('playerPassword').value;
            
            // প্লেয়ারের দেওয়া ছোট আইডির সাথে ব্যাকগ্রাউন্ডে অটোমেটিক মেইল জুড়ে দেওয়া হচ্ছে
            const finalEmail = inputId.toLowerCase() + "@atoz.com";
            
            // এবার ফায়ারবেসের মেইন ফাংশনে এই মেইলটি পাঠানো হচ্ছে
            handlePlayerLogin(finalEmail, pass);
        });
    </script>
</body>
</html>
