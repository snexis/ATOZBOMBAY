<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtoZ Bombay - Player Zone (v4.9)</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script src="firebase-config.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="player-page">

    <header class="player-nav">
        <div class="nav-logo" id="navLogoText">ATOZ BOMBAY</div>
        <div class="nav-user-info">
            <span id="playerNameDisplay">---</span>
            <button type="button" id="playerLogoutBtn" class="logout-btn">লগআউট</button>
        </div>
    </header>

    <main class="player-container">
        
        <section class="welcome-box">
            <h2 id="welcomeHeading">স্বাগতম, প্লেয়ার!</h2>
            <p id="welcomeSubtext">আপনার লাইভ গেমিং ড্যাশবোর্ড এখানে দেখুন।</p>
        </section>

        <section class="player-box chart-section">
            <div class="chart-header">
                <h3 id="chartTitle">📊 লাইভ গেম রেজাল্ট চার্ট</h3>
                
                <button type="button" id="printChartBtn" class="print-btn" title="চার্ট প্রিন্ট করুন">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 6 2 18 2 18 9"></polyline>
                        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                        <rect x="6" y="14" width="12" height="8"></rect>
                    </svg>
                    <span id="printBtnText">প্রিন্ট চার্ট</span>
                </button>
            </div>

            <div class="table-responsive" id="printableArea">
                <table>
                    <thead>
                        <tr>
                            <th id="thTime">সময় (Time Slot)</th>
                            <th id="thResult">উইনিং নাম্বার (Result)</th>
                        </tr>
                    </thead>
                    <tbody id="gameChartTableBody">
                        </tbody>
                </table>
            </div>
        </section>

    </main>

    <script src="player.js"></script>
</body>
</html>
