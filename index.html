<!-- এই যে নিচে দেখুন, ফাইলের একদম ওপরে এভাবে বসিয়ে দেবেন -->
<!-- FILE NAME: index.html | VERSION: v5.7 [Stable] | DATE: 2026-07-16 -->
<!-- PURPOSE: Player Portal with v5.7 Ultimate Loha Kapat Security & Dual Path Tracking -->
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtoZ Bombay - Premium Player Portal</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-app.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-auth.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/8.10.1/firebase-database.min.js"></script>

    <script src="firebase-config.js"></script>
    <link rel="stylesheet" href="style.css">
    
    <style>
        body.login-viewport-v56 { 
            margin: 0; padding: 0; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; min-height: 100vh; 
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden;
        }
        .top-notice-bar {
            position: fixed; top: 0; left: 0; width: 100%; background: #00ffc8; 
            color: #0f172a; padding: 8px 0; font-weight: bold; font-size: 14px;
            box-shadow: 0 2px 10px rgba(0, 255, 200, 0.3); z-index: 999;
        }
        .login-card-v56 { 
            background: rgba(30, 41, 59, 0.7); padding: 40px 30px; border-radius: 16px; 
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.15); width: 90%; max-width: 380px; 
            border: 1px solid rgba(0, 255, 200, 0.2); text-align: center; 
            backdrop-filter: blur(10px); position: relative; margin-top: 40px;
        }
        .login-card-v56 h2 { 
            color: #00ffc8; margin-bottom: 5px; font-size: 26px; 
            text-transform: uppercase; letter-spacing: 1.5px;
            animation: neonPulse 2s infinite alternate;
        }
        @keyframes neonPulse {
            from { text-shadow: 0 0 5px #00ffc8, 0 0 10px #00ffc8; }
            to { text-shadow: 0 0 15px #00ffc8, 0 0 25px #00ffc8; }
        }
        .version-tag { color: #64748b; font-size: 12px; margin-bottom: 25px; font-weight: 600; }
        
        .input-group-v56 { margin-bottom: 18px; text-align: left; position: relative; }
        .input-group-v56 label { display: block; color: #94a3b8; margin-bottom: 6px; font-size: 13px; font-weight: 500; }
        .input-group-v56 input { 
            width: 100%; padding: 12px 40px 12px 12px; border-radius: 8px; 
            border: 1px solid #475569; background: rgba(15, 23, 42, 0.6); color: #fff; 
            font-size: 16px; box-sizing: border-box; transition: 0.3s;
        }
        .input-group-v56 input:focus { border-color: #00ffc8; outline: none; box-shadow: 0 0 8px rgba(0, 255, 200, 0.3); }
        
        .eye-toggle-btn {
            position: absolute; right: 12px; top: 35px; cursor: pointer;
            color: #64748b; font-size: 18px; user-select: none;
        }
        .eye-toggle-btn:hover { color: #00ffc8; }
        
        .remember-wrapper { display: flex; align-items: center; justify-content: flex-start; margin-bottom: 20px; color: #94a3b8; font-size: 13px; }
        .remember-wrapper input { margin-right: 8px; accent-color: #00ffc8; cursor: pointer; }
        
        .btn-login-v56 { 
            width: 100%; padding: 14px; background: #00ffc8; border: none; border-radius: 8px; 
            color: #0f172a; font-size: 16px; font-weight: bold; cursor: pointer; 
            transition: all 0.2s ease; letter-spacing: 0.5px;
        }
        .btn-login-v56:hover { background: #00d9a6; box-shadow: 0 0 15px rgba(0,255,200,0.6); }
        .btn-login-v56:active { background: #047857; color: #fff; }
        
        .error-message { color: #ef4444; font-size: 14px; margin-top: 12px; display: none; font-weight: 500; }
    </style>
</head>
<body class="login-viewport-v56">

    <div class="top-notice-bar">
        <marquee id="liveNoticeBar" scrollamount="4">লোড হচ্ছে...</marquee>
    </div>

    <div class="login-card-v56">
        <h2>ATOZ BOMBAY LOGIN</h2>
        <div class="version-tag">Portal v5.7 [Stable]</div>
        
        <form id="playerLoginForm">
            <div class="input-group-v56">
                <label for="playerId">প্লেয়ার আইডি (Player ID):</label>
                <input type="text" id="playerId" required placeholder="আইডি টাইপ করুন">
            </div>
            
            <div class="input-group-v56">
                <label for="playerPin">পিন কোড (PIN Code):</label>
                <input type="password" id="playerPin" required placeholder="৪ ডিজিট পিন">
                <span id="togglePinEye" class="eye-toggle-btn">👁️</span>
            </div>
            
            <div class="remember-wrapper">
                <input type="checkbox" id="rememberPlayer">
                <label for="rememberPlayer">আইডি মনে রাখুন (Remember ID)</label>
            </div>
            
            <button type="submit" class="btn-login-v56">লগইন করুন</button>
            <div id="loginError" class="error-message">ভুল আইডি অথবা পিন! আবার চেষ্টা করুন।</div>
        </form>
    </div>

    <script>
        const pinInput = document.getElementById('playerPin');
        const eyeBtn = document.getElementById('togglePinEye');
        
        eyeBtn.addEventListener('click', function() {
            if (pinInput.type === 'password') {
                pinInput.type = 'text';
                eyeBtn.innerText = '🔒';
            } else {
                pinInput.type = 'password';
                eyeBtn.innerText = '👁️';
            }
        });

        // নোটিস বোর্ড লাইভ সিঙ্ক লজিক
        function initNoticeListener() {
            if (typeof firebase !== 'undefined' && firebase.apps.length > 0) {
                firebase.database().ref('notice').on('value', (snapshot) => {
                    const noticeText = snapshot.val();
                    document.getElementById('liveNoticeBar').innerText = noticeText ? noticeText : "AtoZ Bombay গেম জোনে আপনাকে স্বাগতম!";
                });
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            const savedId = localStorage.getItem("rememberedPlayerId");
            if(savedId) {
                document.getElementById('playerId').value = savedId;
                document.getElementById('rememberPlayer').checked = true;
            }
            
            // ফায়ারবেস লোড হওয়া পর্যন্ত চেক করবে
            const checkFirebase = setInterval(() => {
                if (typeof firebase !== 'undefined' && firebase.apps.length > 0) {
                    initNoticeListener();
                    clearInterval(checkFirebase);
                }
            }, 500);
        });

        // "লোহা কপাট" সিকিউরিটি লজিক (৩ বার ভুল পিন দিলে ব্লক সিস্টেম + ডাবল পাথ ট্র্যাকিং মিক্সড)
        document.getElementById('playerLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('playerId').value.trim();
            const pin = document.getElementById('playerPin').value.trim();
            const rememberMe = document.getElementById('rememberPlayer').checked;
            const errorDiv = document.getElementById('loginError');

            if (typeof firebase === 'undefined' || firebase.apps.length === 0) {
                alert("ফায়ারবেস এখনও কানেক্ট হচ্ছে, অনুগ্রহ করে একটু অপেক্ষা করুন!");
                return;
            }

            // ১. ব্রাউজারের লোকাল মেমোরিতে এই আইডির ভুলের ট্র্যাকার চেক করা
            let attempts = parseInt(localStorage.getItem("attempts_" + id)) || 0;
            let lockTime = localStorage.getItem("lockTime_" + id);

            // ২৪ ঘণ্টার লক রুলস চেক করা (লোকাল লেভেল)
            if (lockTime) {
                const hoursLeft = (new Date().getTime() - parseInt(lockTime)) / (1000 * 60 * 60);
                if (hoursLeft < 24) {
                    errorDiv.style.display = 'block';
                    errorDiv.innerText = "নিরাপত্তার স্বার্থে আপনার আইডিটি সাময়িকভাবে লক করা আছে। অনুগ্রহ করে অ্যাডমিনের সাথে যোগাযোগ করুন!";
                    return;
                } else {
                    // ২৪ ঘণ্টা পার হলে অটো রিসেট
                    localStorage.removeItem("attempts_" + id);
                    localStorage.removeItem("lockTime_" + id);
                    attempts = 0;
                }
            }

            // ২. ফায়ারবেসে সিকিউর কানেকশন শুরু (ধাপ ১-এ সচল করা Anonymous Login)
            firebase.auth().signInAnonymously().then(() => {
                
                // ৩. প্রথমে রুট লেভেলে (যেমন: /plyer2) আইডি খোঁজা
                firebase.database().ref(id).once('value').then((snapshot) => {
                    let playerData = snapshot.val();
                    let dbPath = id; 

                    // ৪. যদি রুটে ডাটা না পায়, তবে 'users/' ফোল্ডারের ভেতর (যেমন: users/player01) খুঁজবে
                    if (!playerData) {
                        firebase.database().ref('users/' + id).once('value').then((userSnapshot) => {
                            playerData = userSnapshot.val();
                            dbPath = 'users/' + id;
                            processLogin(playerData, dbPath); // মিক্সড লগইন প্রসেস ফাংশনে পাঠানো হলো
                        });
                    } else {
                        processLogin(playerData, dbPath);
                    }
                });

            }).catch((authErr) => {
                console.error(authErr);
                errorDiv.style.display = 'block';
                errorDiv.innerText = "অথেন্টিকেশন এরর! অনুগ্রহ করে আবার চেষ্টা করুন।";
            });

            // প্লেয়ারের পিন ও স্ট্যাটাস যাচাই করার মূল মিক্সড ফাংশন
            function processLogin(playerData, dbPath) {
                if (!playerData) {
                    // আইডি যদি কোনো পাথমধ্যেই না থাকে
                    firebase.auth().signOut();
                    errorDiv.style.display = 'block';
                    errorDiv.innerText = "ভুল আইডি অথবা পিন!";
                    return;
                }

                // ৫. ডেটাবেসে প্লেয়ারটি অলরেডি ব্লকড কি না যাচাই করা (সার্ভার লেভেল লক)
                if (playerData.status && playerData.status !== 'active') {
                    firebase.auth().signOut();
                    errorDiv.style.display = 'block';
                    errorDiv.innerText = `আপনার অ্যাকাউন্টটি ব্লক করা আছে! কারণ: ${playerData.lockReason || 'অজানা'}`;
                    return;
                }

                // ডাটাবেস থেকে পাসওয়ার্ড বা পিন রিড করা (password বা pin দুটোই সাপোর্ট করবে)
                const dbPassword = playerData.password || playerData.pin;

                // ৬. পাসওয়ার্ড বা পিন ম্যাচ করানো
                if (dbPassword == pin) {
                    // সফলভাবে লগইন হলে ভুলের কাউন্টার রিসেট
                    localStorage.removeItem("attempts_" + id);
                    localStorage.removeItem("lockTime_" + id);

                    if(rememberMe) {
                        localStorage.setItem("rememberedPlayerId", id);
                    } else {
                        localStorage.removeItem("rememberedPlayerId");
                    }

                    localStorage.setItem("loggedInUser", JSON.stringify({ id: id, name: id }));
                    window.location.href = "dashboard.html"; 
                } else {
                    // ভুল পিন দিলে কাউন্টার বাড়ানো
                    attempts++;
                    localStorage.setItem("attempts_" + id, attempts);

                    if (attempts >= 3) {
                        // ৩ বার ভুল হলে ব্রাউজার ও ডেটাবেস লেভেলে লক করা
                        localStorage.setItem("lockTime_" + id, new Date().getTime());
                        
                        // ফায়ারবেস ডেটাবেসে সঠিক পাথে স্ট্যাটাস আপডেট এবং লকের কারণ লিখে পাঠানো
                        firebase.database().ref(dbPath).update({
                            status: "blocked",
                            lockReason: "Too many wrong PIN attempts"
                        }).then(() => {
                            firebase.auth().signOut();
                            errorDiv.style.display = 'block';
                            errorDiv.innerText = "৩ বার ভুল পিন দেওয়ার কারণে আইডিটি লক হয়ে গেছে! অ্যাডমিন আনলক না করা পর্যন্ত প্রবেশ নিষেধ।";
                        });
                    } else {
                        firebase.auth().signOut();
                        errorDiv.style.display = 'block';
                        errorDiv.innerText = `ভুল পিন! আর মাত্র ${3 - attempts} বার ভুল করলে আইডি লক হয়ে যাবে।`;
                    }
                }
            }
        });
    </script>
</body>
</html>
